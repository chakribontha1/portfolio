name: Frontend CI/CD to S3 + CloudFront   # Workflow name

on:
  push:
    branches:
      - main   # Runs when you push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest   # GitHub runner (Linux machine)

    steps:
      # 🔹 Step 1: Get your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔹 Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'   # speeds up installs

      # 🔹 Step 3: Install dependencies inside client folder
      - name: Install dependencies (client)
        run: |
          cd client
          npm ci
        # 👉 installs all packages (including vite)

      # 🔹 Step 4: Build frontend (creates dist/)
      - name: Build project (client)
        run: |
          cd client
          npm run build
        # 👉 output will be: client/dist/

      # 🔹 Step 5: Check build output (debug)
      - name: Check dist folder
        run: |
          ls -la client/dist
        # 👉 ensures dist folder exists

      # 🔹 Step 6: Connect GitHub to AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 🔹 Step 7: Upload build files to S3
      - name: Upload dist to S3
        run: |
          aws s3 sync client/dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
          --delete \
          --cache-control "max-age=31536000,public"
        # 👉 uploads your React build to S3
        # 👉 --delete removes old files
        # 👉 cache-control improves performance

      # 🔹 Step 8: Clear CloudFront cache
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
        # 👉 ensures users see latest changes